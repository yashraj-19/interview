<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>SViam — AI Interviewer</title>
  <style>
    :root {
      --bg: #0b0d10; --panel: #14181d; --line: #232a32;
      --text: #e7ecf1; --muted: #8a95a1; --accent: #5b9dff; --bot: #9b8cff; --you: #4fd6a6;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0; background: var(--bg); color: var(--text);
      font: 15px/1.5 -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif;
      height: 100vh; display: flex; flex-direction: column;
    }
    header {
      display: flex; align-items: center; gap: 14px;
      padding: 16px 22px; border-bottom: 1px solid var(--line);
    }
    .wordmark { font-weight: 700; letter-spacing: .5px; font-size: 20px; }
    .wordmark span { color: var(--accent); }
    .sub { color: var(--muted); font-size: 13px; }
    .spacer { flex: 1; }
    button {
      font: inherit; font-weight: 600; cursor: pointer; border-radius: 8px;
      border: 1px solid var(--line); padding: 9px 18px; color: var(--text); background: #1b2129;
      transition: background .15s, border-color .15s;
    }
    button:hover:not(:disabled) { border-color: var(--accent); }
    button:disabled { opacity: .4; cursor: default; }
    #connectBtn { background: var(--accent); border-color: var(--accent); color: #08101e; }
    #endBtn { background: #2a1416; border-color: #5b2a2f; color: #ff9aa2; }

    main { flex: 1; display: flex; flex-direction: column; max-width: 820px; width: 100%;
           margin: 0 auto; padding: 18px 22px; overflow: hidden; }
    .statusbar {
      display: flex; align-items: center; gap: 10px; padding: 10px 14px; margin-bottom: 14px;
      background: var(--panel); border: 1px solid var(--line); border-radius: 10px;
    }
    .dot { width: 10px; height: 10px; border-radius: 50%; background: var(--muted); }
    .dot.listening { background: var(--you); box-shadow: 0 0 10px var(--you); }
    .dot.speaking  { background: var(--accent); box-shadow: 0 0 10px var(--accent); }
    .dot.thinking  { background: #f1c40f; box-shadow: 0 0 10px #f1c40f; }
    .dot.idle { background: var(--muted); }
    #statusText { font-weight: 600; }
    .hint { color: var(--muted); font-size: 13px; }

    #transcript { flex: 1; overflow-y: auto; padding-right: 6px; }
    .turn { margin: 0 0 14px; }
    .who { font-size: 12px; text-transform: uppercase; letter-spacing: .6px; color: var(--muted); margin-bottom: 3px; }
    .turn.bot .who { color: var(--bot); }
    .turn.candidate .who { color: var(--you); }
    .bubble { white-space: pre-wrap; }
    .empty { color: var(--muted); text-align: center; margin-top: 40px; }
  </style>
</head>
<body>
  <header>
    <div class="wordmark">S<span>V</span>iam</div>
    <div class="sub">autonomous technical interviewer</div>
    <div class="spacer"></div>
    <button id="connectBtn">Connect</button>
    <button id="endBtn" disabled>End</button>
  </header>

  <main>
    <div class="statusbar">
      <span id="dot" class="dot idle"></span>
      <span id="statusText">Not connected</span>
      <span class="spacer"></span>
      <span class="hint">Use Chrome · allow microphone · speak any time — you can interrupt it</span>
    </div>
    <div id="transcript"><div class="empty">Click <b>Connect</b> and the interviewer will greet you.</div></div>
  </main>

  <audio id="remoteAudio" autoplay></audio>
  <script src="app.js"></script>
</body>
</html>
